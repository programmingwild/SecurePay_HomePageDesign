<svg width="360" height="640" viewBox="0 0 360 640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient Light -->
  <defs>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FBFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DBE8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F0FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="360" height="640" fill="url(#lightGrad)"/>
  
  <!-- Greeting -->
  <text x="20" y="40" font-family="'Google Sans', sans-serif" font-size="20" font-weight="700" fill="#0F2450">Hello, User</text>
  <text x="20" y="58" font-family="'Google Sans', sans-serif" font-size="13" fill="#3D5A8C">Secure UPI, Wallet & Recharges</text>
  
  <!-- Hero Status Card -->
  <rect x="20" y="70" width="320" height="60" rx="18" fill="#F4F8FF" stroke="#BECCEEE" stroke-width="1"/>
  <text x="36" y="95" font-size="24">🔒</text>
  <text x="36" y="120" font-family="'Google Sans', sans-serif" font-size="13" fill="#3D5A8C">SecurePay Status: Active</text>
  
  <!-- Balance Card -->
  <rect x="20" y="145" width="320" height="100" rx="16" fill="#F4F8FF" stroke="#BECCEEE" stroke-width="1"/>
  <text x="36" y="167" font-family="'Google Sans', sans-serif" font-size="13" fill="#6B7FA3">SecurePay Wallet Balance</text>
  <text x="36" y="210" font-family="'Google Sans', sans-serif" font-size="32" font-weight="800" fill="#0F2450">₹45,82,914</text>
  <text x="36" y="232" font-family="'Google Sans', sans-serif" font-size="11" fill="#8B9DC3">Linked Bank •••• 2184</text>
  
  <!-- Quick Actions Title -->
  <text x="20" y="275" font-family="'Google Sans', sans-serif" font-size="16" font-weight="700" fill="#0F2450">Quick Actions</text>
  
  <!-- Quick Actions Grid (4x2) - Light variant colors -->
  <!-- Row 1 -->
  <rect x="20" y="290" width="70" height="70" rx="12" fill="#6B9EFF" opacity="0.9"/>
  <text x="55" y="335" font-size="20" text-anchor="middle">📱</text>
  
  <rect x="105" y="290" width="70" height="70" rx="12" fill="#4DB8A8" opacity="0.9"/>
  <text x="140" y="335" font-size="20" text-anchor="middle">💸</text>
  
  <rect x="190" y="290" width="70" height="70" rx="12" fill="#9B7CCC" opacity="0.9"/>
  <text x="225" y="335" font-size="20" text-anchor="middle">🏦</text>
  
  <rect x="275" y="290" width="70" height="70" rx="12" fill="#FFAA6B" opacity="0.9"/>
  <text x="310" y="335" font-size="20" text-anchor="middle">💰</text>
  
  <!-- Row 2 -->
  <rect x="20" y="375" width="70" height="70" rx="12" fill="#5DD0CD" opacity="0.9"/>
  <text x="55" y="420" font-size="20" text-anchor="middle">📄</text>
  
  <rect x="105" y="375" width="70" height="70" rx="12" fill="#FF9999" opacity="0.9"/>
  <text x="140" y="420" font-size="20" text-anchor="middle">📞</text>
  
  <rect x="190" y="375" width="70" height="70" rx="12" fill="#9DAAB8" opacity="0.9"/>
  <text x="225" y="420" font-size="20" text-anchor="middle">%</text>
  
  <rect x="275" y="375" width="70" height="70" rx="12" fill="#6B9EFF"/>
  <text x="310" y="420" font-size="20" text-anchor="middle">⭐</text>
  
  <!-- Transactions Section -->
  <text x="20" y="475" font-family="'Google Sans', sans-serif" font-size="16" font-weight="700" fill="#0F2450">Recent Transactions</text>
  
  <rect x="20" y="490" width="320" height="50" rx="12" fill="#F4F8FF" stroke="#BECCEEE" stroke-width="1"/>
  <text x="36" y="515" font-family="'Google Sans', sans-serif" font-size="13" fill="#0F2450">John Doe</text>
  <text x="36" y="535" font-family="'Google Sans', sans-serif" font-size="12" fill="#4DB8A8">→ ₹500</text>
  <text x="300" y="520" font-family="'Google Sans', sans-serif" font-size="13" fill="#0F2450" text-anchor="end">17:30</text>
  
  <rect x="20" y="550" width="320" height="50" rx="12" fill="#F4F8FF" stroke="#BECCEEE" stroke-width="1"/>
  <text x="36" y="575" font-family="'Google Sans', sans-serif" font-size="13" fill="#0F2450">Sarah Miller</text>
  <text x="36" y="595" font-family="'Google Sans', sans-serif" font-size="12" fill="#4DB8A8">+₹2,000</text>
  <text x="300" y="580" font-family="'Google Sans', sans-serif" font-size="13" fill="#0F2450" text-anchor="end">14:22</text>
</svg>
