<svg width="360" height="640" viewBox="0 0 360 640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with orb effects -->
  <defs>
    <linearGradient id="onboardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060A1E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0A1030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A0B35;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="orbGrad1">
      <stop offset="0%" style="stop-color:#3A63F3;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#3A63F3;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <rect width="360" height="640" fill="url(#onboardGrad)"/>
  
  <!-- Ambient orbs for atmosphere -->
  <circle cx="80" cy="100" r="120" fill="url(#orbGrad1)"/>
  <circle cx="320" cy="400" r="150" fill="url(#orbGrad1)"/>
  
  <!-- Progress indicator (Page 1 of 3) -->
  <circle cx="160" cy="60" r="4" fill="#3A63F3"/>
  <circle cx="180" cy="60" r="4" fill="rgba(255,255,255,0.2)"/>
  <circle cx="200" cy="60" r="4" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Main Content -->
  <text x="180" y="280" font-family="'Google Sans', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">Designed For</text>
  <text x="180" y="315" font-family="'Google Sans', sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">Confident Payments</text>
  
  <text x="180" y="350" font-family="'Google Sans', sans-serif" font-size="16" fill="#E5EDFF" text-anchor="middle">A cinematic wallet experience</text>
  
  <!-- Tags -->
  <rect x="95" y="385" width="70" height="32" rx="16" fill="rgba(93, 123, 255, 0.2)" stroke="rgba(93, 123, 255, 0.3)" stroke-width="1"/>
  <text x="130" y="407" font-family="'Google Sans', sans-serif" font-size="11" fill="#E5EDFF" text-anchor="middle">Glass UI</text>
  
  <rect x="195" y="385" width="70" height="32" rx="16" fill="rgba(93, 123, 255, 0.2)" stroke="rgba(93, 123, 255, 0.3)" stroke-width="1"/>
  <text x="230" y="407" font-family="'Google Sans', sans-serif" font-size="11" fill="#E5EDFF" text-anchor="middle">Fluid Motion</text>
  
  <!-- CTA Button -->
  <rect x="70" y="540" width="220" height="50" rx="14" fill="#3A63F3"/>
  <text x="180" y="572" font-family="'Google Sans', sans-serif" font-size="16" font-weight="600" fill="#FFFFFF" text-anchor="middle">Let's Get Started</text>
  
  <!-- Skip Button -->
  <text x="180" y="610" font-family="'Google Sans', sans-serif" font-size="14" fill="#8A9DD6" text-anchor="middle">Skip →</text>
</svg>
