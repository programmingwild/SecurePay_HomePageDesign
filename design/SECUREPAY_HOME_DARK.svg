<svg width="360" height="640" viewBox="0 0 360 640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060A1E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0A1030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A0B35;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="360" height="640" fill="url(#darkGrad)"/>
  
  <!-- Greeting -->
  <text x="20" y="40" font-family="'Google Sans', sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">Hello, User</text>
  <text x="20" y="58" font-family="'Google Sans', sans-serif" font-size="13" fill="#D0DAF7">Secure UPI, Wallet & Recharges</text>
  
  <!-- Hero Status Card -->
  <rect x="20" y="70" width="320" height="60" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="36" y="95" font-size="24">🔒</text>
  <text x="36" y="120" font-family="'Google Sans', sans-serif" font-size="13" fill="#E5EDFF">SecurePay Status: Active</text>
  
  <!-- Balance Card -->
  <defs>
    <linearGradient id="balanceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(58, 99, 243, 0.2);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(30, 214, 255, 0.1);stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="20" y="145" width="320" height="100" rx="16" fill="url(#balanceGrad)" stroke="rgba(30, 214, 255, 0.2)" stroke-width="1"/>
  <text x="36" y="167" font-family="'Google Sans', sans-serif" font-size="13" fill="#D6DEFF">SecurePay Wallet Balance</text>
  <text x="36" y="210" font-family="'Google Sans', sans-serif" font-size="32" font-weight="800" fill="#FFFFFF">₹45,82,914</text>
  <text x="36" y="232" font-family="'Google Sans', sans-serif" font-size="11" fill="#B9C8EC">Linked Bank •••• 2184</text>
  
  <!-- Quick Actions Title -->
  <text x="20" y="275" font-family="'Google Sans', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Quick Actions</text>
  
  <!-- Quick Actions Grid (4x2) -->
  <!-- Row 1 -->
  <rect x="20" y="290" width="70" height="70" rx="12" fill="#4B7CFF"/>
  <text x="55" y="335" font-size="20" text-anchor="middle">📱</text>
  
  <rect x="105" y="290" width="70" height="70" rx="12" fill="#00A884"/>
  <text x="140" y="335" font-size="20" text-anchor="middle">💸</text>
  
  <rect x="190" y="290" width="70" height="70" rx="12" fill="#8A5BFF"/>
  <text x="225" y="335" font-size="20" text-anchor="middle">🏦</text>
  
  <rect x="275" y="290" width="70" height="70" rx="12" fill="#FF8A3D"/>
  <text x="310" y="335" font-size="20" text-anchor="middle">💰</text>
  
  <!-- Row 2 -->
  <rect x="20" y="375" width="70" height="70" rx="12" fill="#2CB3B0"/>
  <text x="55" y="420" font-size="20" text-anchor="middle">📄</text>
  
  <rect x="105" y="375" width="70" height="70" rx="12" fill="#EF5350"/>
  <text x="140" y="420" font-size="20" text-anchor="middle">📞</text>
  
  <rect x="190" y="375" width="70" height="70" rx="12" fill="#6D7C93"/>
  <text x="225" y="420" font-size="20" text-anchor="middle">%</text>
  
  <rect x="275" y="375" width="70" height="70" rx="12" fill="#3A63F3"/>
  <text x="310" y="420" font-size="20" text-anchor="middle">⭐</text>
  
  <!-- Transactions Section -->
  <text x="20" y="475" font-family="'Google Sans', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Recent Transactions</text>
  
  <rect x="20" y="490" width="320" height="50" rx="12" fill="rgba(255,255,255,0.05)"/>
  <text x="36" y="515" font-family="'Google Sans', sans-serif" font-size="13" fill="#E5EDFF">John Doe</text>
  <text x="36" y="535" font-family="'Google Sans', sans-serif" font-size="12" fill="#00A884">→ ₹500</text>
  <text x="300" y="520" font-family="'Google Sans', sans-serif" font-size="13" fill="#E5EDFF" text-anchor="end">17:30</text>
  
  <rect x="20" y="550" width="320" height="50" rx="12" fill="rgba(255,255,255,0.05)"/>
  <text x="36" y="575" font-family="'Google Sans', sans-serif" font-size="13" fill="#E5EDFF">Sarah Miller</text>
  <text x="36" y="595" font-family="'Google Sans', sans-serif" font-size="12" fill="#00A884">+₹2,000</text>
  <text x="300" y="580" font-family="'Google Sans', sans-serif" font-size="13" fill="#E5EDFF" text-anchor="end">14:22</text>
</svg>
